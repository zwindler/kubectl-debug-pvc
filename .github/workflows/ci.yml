name: CI

on:
  push:
    branches: ["main"]
    # Don't run CI on tag pushes — the release workflow handles those
    tags-ignore: ["**"]
  pull_request:
    branches: ["main"]

# ── Security: deny all permissions by default ─────────────────────────────────
permissions: {}

jobs:
  check:
    name: Build & Lint
    runs-on: ubuntu-latest

    permissions:
      # Read-only checkout is sufficient for CI
      contents: read

    steps:
      # ── 1. Harden the runner ──────────────────────────────────────────────
      - name: Harden runner
        uses: step-security/harden-runner@ec9f61e6f72cf5cba82d0fc64e85e640a23c7a0a # v2.13.0
        with:
          egress-policy: audit

      # ── 2. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── 3. Set up Go ──────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      # ── 4. Verify dependencies haven't been tampered with ─────────────────
      # go mod verify checks that locally cached modules match their checksums.
      # go mod tidy --diff fails if go.sum is not up to date.
      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.sum

      # ── 5. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: make build

      # ── 6. go vet ─────────────────────────────────────────────────────────
      - name: Vet
        run: make vet

      # ── 7. golangci-lint ──────────────────────────────────────────────────
      # Version is pinned here (not "latest") so a new linter release cannot
      # silently break CI without an explicit version bump in this file.
      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.1.6
