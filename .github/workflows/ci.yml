name: CI

on:
  push:
    branches: ["main"]
    # Don't run CI on tag pushes — the release workflow handles those
    tags-ignore: ["**"]
  pull_request:
    branches: ["main"]

# ── Security: deny all permissions by default ─────────────────────────────────
permissions: {}

jobs:
  check:
    name: Build & Lint
    runs-on: ubuntu-latest

    permissions:
      # Read-only checkout is sufficient for CI
      contents: read

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── 2. Set up Go ──────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      # ── 3. Verify dependencies haven't been tampered with ─────────────────
      # go mod verify checks that locally cached modules match their checksums.
      # go mod tidy --diff fails if go.sum is not up to date.
      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.sum

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: make build

      # ── 5. go vet ─────────────────────────────────────────────────────────
      - name: Vet
        run: make vet

      # ── 6. golangci-lint ──────────────────────────────────────────────────
      # Version is pinned here (not "latest") so a new linter release cannot
      # silently break CI without an explicit version bump in this file.
      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.3
